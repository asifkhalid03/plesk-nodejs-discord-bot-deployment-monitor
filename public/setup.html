<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Initial setup for Deployment Log Watcher — create your admin account and configure secrets." />
    <meta name="theme-color" content="#0b0f19" />
    <title>Setup - Deployment Log Watcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=20260710-setup-reset" />
  </head>
  <body class="loginPage setupPending">
    <main class="setupShell">
      <form id="setupForm" class="loginPanel setupPanel">
        <div class="login-logo">
          <div class="topbar-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
              <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
              <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
              <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
            </svg>
          </div>
        </div>
        <h1>First-Time Setup</h1>
        <p>Create the admin login. Encryption and session secrets are generated automatically.</p>

        <div class="grid">
          <label>
            Admin email
            <input id="uiLoginEmail" type="email" autocomplete="username" required placeholder="admin@example.com" />
          </label>

          <label>
            Admin password
            <input id="uiLoginPassword" type="password" autocomplete="new-password" minlength="8" required placeholder="Min 8 characters" />
          </label>

          <label>
            Confirm password
            <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required placeholder="Repeat password" />
          </label>

          <label>
            Encryption key
            <span class="inputAction">
              <input id="encryptionKey" autocomplete="off" placeholder="Auto-generated if blank" />
              <button type="button" data-generate="encryptionKey">Generate</button>
            </span>
          </label>

          <label>
            Session secret
            <span class="inputAction">
              <input id="uiSessionSecret" autocomplete="off" placeholder="Auto-generated if blank" />
              <button type="button" data-generate="uiSessionSecret">Generate</button>
            </span>
          </label>

          <label>
            Generate password
            <button type="button" id="generatePasswordBtn">Generate admin password</button>
          </label>

          <label>
            Discord bot token
            <input id="discordBotToken" type="password" autocomplete="off" placeholder="Optional" />
          </label>

          <label>
            Discord guild ID
            <input id="discordGuildId" placeholder="Optional" />
          </label>

          <label>
            Discord client ID
            <input id="discordClientId" placeholder="Optional" />
          </label>

          <label>
            Daily reports channel ID
            <input id="dailyReportsChannelId" placeholder="Optional" />
          </label>

          <label>
            Reports download channel ID
            <input id="reportsDownloadChannelId" placeholder="Optional" />
          </label>
        </div>

        <div id="setupError" class="error hidden"></div>
        <button type="submit" class="primary" style="min-height:42px;font-size:15px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;vertical-align:-3px"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save setup
        </button>
      </form>
    </main>

    <script>
      const form = document.querySelector('#setupForm');
      const errorBox = document.querySelector('#setupError');

      function randomBase64(bytes = 32) {
        const data = new Uint8Array(bytes);
        crypto.getRandomValues(data);
        let binary = '';
        data.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary);
      }

      function randomPassword() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%*-_=+';
        const data = new Uint8Array(18);
        crypto.getRandomValues(data);
        return Array.from(data, (byte) => chars[byte % chars.length]).join('');
      }

      async function checkSetupStatus() {
        const response = await fetch('/api/setup/status');
        if (!response.ok) return;
        const status = await response.json();
        if (status.setupComplete) window.location.replace('/login');
        else document.body.classList.remove('setupPending');
      }

      document.querySelectorAll('[data-generate]').forEach((button) => {
        button.addEventListener('click', () => {
          document.querySelector(`#${button.dataset.generate}`).value = randomBase64();
        });
      });

      document.querySelector('#generatePasswordBtn').addEventListener('click', () => {
        const password = randomPassword();
        document.querySelector('#uiLoginPassword').value = password;
        document.querySelector('#confirmPassword').value = password;
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorBox.classList.add('hidden');

        const response = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            uiLoginEmail: document.querySelector('#uiLoginEmail').value,
            uiLoginPassword: document.querySelector('#uiLoginPassword').value,
            confirmPassword: document.querySelector('#confirmPassword').value,
            encryptionKey: document.querySelector('#encryptionKey').value,
            uiSessionSecret: document.querySelector('#uiSessionSecret').value,
            discordBotToken: document.querySelector('#discordBotToken').value,
            discordGuildId: document.querySelector('#discordGuildId').value,
            discordClientId: document.querySelector('#discordClientId').value,
            dailyReportsChannelId: document.querySelector('#dailyReportsChannelId').value,
            reportsDownloadChannelId: document.querySelector('#reportsDownloadChannelId').value
          })
        });

        if (response.ok) {
          window.location.replace('/login');
          return;
        }

        const body = await response.json().catch(() => ({}));
        errorBox.textContent = body.error || 'Setup failed.';
        errorBox.classList.remove('hidden');
      });

      checkSetupStatus().catch(() => {});
    </script>
  </body>
</html>
